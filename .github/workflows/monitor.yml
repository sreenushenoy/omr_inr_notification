name: OMR/INR Rate Monitor

on:
  schedule:
    - cron: '30 6 * * *'   # 10:00 AM Oman Time (UTC+4)
    - cron: '30 12 * * *'  # 04:00 PM Oman Time (UTC+4)
    - cron: '30 16 * * *'  # 08:00 PM Oman Time (UTC+4)
  workflow_dispatch:        # Allow manual trigger for testing

jobs:
  check-rate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restore last rate cache
        uses: actions/cache@v4
        with:
          path: last_rate.json
          key: last-rate-${{ github.run_id }}
          restore-keys: |
            last-rate-

      - name: Run rate monitor
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: python monitor.py

      - name: Save last rate cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: last_rate.json
          key: last-rate-${{ github.run_id }}
